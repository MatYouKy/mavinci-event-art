<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f5f5f5; font-family: Arial, Helvetica, sans-serif; color:#1c1f33;">
  <tr>
    <td align="left" style="padding:24px 12px;">

      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="width:100%; max-width:640px; background:#ffffff; border-collapse:separate; border-spacing:0; border-radius:10px; overflow:hidden;">
        
        <tr>
          <td align="center" style="padding:16px 28px; border-bottom:1px solid {{brand_primary_color}}; background:#ffffff;">
            <img src="{{company_logo}}" alt="{{company_name}}" height="42" style="display:block; max-height:42px; border:0; outline:none; text-decoration:none;" />
          </td>
        </tr>

        <tr>
          <td width="100%" style="padding:32px 28px; font-size:14px; line-height:1.6; color:#1c1f33;">
            <div style="white-space:pre-wrap; width:100%;">{{content}}</div>
          </td>
        </tr>

        <tr>
          <td>
            {{signature}}
          </td>
        </tr>

        <tr>
          <td style="padding:12px 20px; background:{{brand_primary_color}}; color:#ffffff; font-size:11px; line-height:1.4; text-align:left;">
            Wiadomość wysłana z {{company_name}}
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>
